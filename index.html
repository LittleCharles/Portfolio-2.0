    <!-- SPA redirect handler (works with 404.html) -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Mono:wght@400;700&family=VT323&family=JetBrains+Mono:wght@400;700&family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // All color/shadow/border/font aliases resolve at runtime via CSS
      // variables defined in src/index.css under each [data-theme="..."]
      // block. That's what makes the skin switcher work — no rebuild needed.
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Theme tokens
              'bg':          'var(--color-bg)',
              'fg':          'var(--color-fg)',
              'surface':     'var(--color-surface)',
              'surface-alt': 'var(--color-surface-alt)',
              'muted':       'var(--color-muted)',
              'accent':      'var(--color-accent)',
              'on-accent':   'var(--color-on-accent)',
              'accent-2':    'var(--color-accent-2)',
              'accent-3':    'var(--color-accent-3)',
              'highlight':   'var(--color-highlight)',
              'inverse-bg':  'var(--color-inverse-bg)',
              'inverse-fg':  'var(--color-inverse-fg)',
              'theme-border':'var(--color-border)',
              // Legacy aliases (kept so any stray reference still themes correctly)
              'brutal-green':  'var(--color-accent)',
              'brutal-red':    'var(--color-accent-2)',
              'brutal-purple': 'var(--color-accent-3)',
            },
            fontFamily: {
              sans:    ['var(--font-body)',    'Inter', 'sans-serif'],
              mono:    ['var(--font-mono)',    'Space Mono', 'monospace'],
              display: ['var(--font-display)', 'Inter', 'sans-serif'],
            },
            boxShadow: {
              'theme':    'var(--shadow-theme)',
              'theme-sm': 'var(--shadow-theme-sm)',
              'theme-lg': 'var(--shadow-theme-lg)',
              // Legacy aliases
              'hard':     'var(--shadow-theme)',
              'hard-sm':  'var(--shadow-theme-sm)',
              'hard-lg':  'var(--shadow-theme-lg)',
            },
            borderWidth: {
              'theme':    'var(--border-w)',
              'theme-sm': 'var(--border-w-sm)',
            },
            borderColor: {
              DEFAULT: 'var(--color-border)',
            },
          },
        },
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
